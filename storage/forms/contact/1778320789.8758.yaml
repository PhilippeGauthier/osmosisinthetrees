message_body: |-
  Hi Osmosis team!

  My name is Sju and I am a queer electronic musician currently based in Prague. I'm going on a West Coat tour end of September/early October playing shows in Portland, Seattle, San Francisco and LA, and I would absolutely love to play a show at your festival! I have been following you for a while now and I love your festival! 

  Here are some of my live videos from some of the biggest festivals in Europe:
  https://www.dropbox.com/scl/fo/1ops0er6292m09ett3w58/AI0Z0_SIcpW3fqT4sLarqTM?rlkey=6s1b8jy371hoag18zi53chsib&st=iptygim6&dl=0

  And more links to my music:
  https://linktr.ee/sjumusic

  Spotify:
  https://open.spotify.com/artist/3KjvJE6bPR8OSKyktWQ5u3?si=Nuu1rlFBR3G5GOe62zkrDQ

  If there is any chance I can play at Osmosis please let me know:)
  Thank you for your consideration<3

  Lots of love
  Sju
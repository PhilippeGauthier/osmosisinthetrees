name: 'cobi Liu'
email: aprillzw@yahoo.com
message_body: |-
  Dear Osmosis Festival Team,
  Hope this email finds you well.
  My name is Cobi, and I’m writing to express my strong interest in volunteering for Osmosis 2026.
  I attended the festival last year with a friend who was performing. Since I was lucky enough to attend without a ticket, I wanted to give back to the festival and did my absolute best to help out with various tasks on-site. I truly loved the energy and the community you’ve built, which is why I’m so eager to return this year and contribute even more.
  In addition, I have a few friends who are also very passionate about the music and would love to join me as volunteers this year.
  Could you please let us know when the volunteer applications will open for 2026, or how we can apply early as a group? We are ready to help with whatever is needed to make this year's festival a huge success.
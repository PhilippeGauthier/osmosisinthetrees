name: 'Juwairia Quazi'
email: info@tinihabitat.com
message_body: |-
  Dear,
  I hope this message finds you well. I am currently the Founder of Planetary Health Lab and CEO of TiniHabitat, a complimentary alternative therapies incubator with over 1000 practitioners. Our team recently came across your work on healing and we found it to be inspiring. It would be great to discuss a potential collaboration around an evidence-based approach to healing and our new mentorship program in planetary health from a fem tech perspective. We believe that practitioners have an integral role in protecting our planet. Please let me know if this would be of interest to you, and I look forward to setting up a call.
  Best regards,
  Juwairia
message_body: "Hi there! Is Osmosis accepting art applications this year? I'm friends with one of the sound technicians who suggested I apply, I do a bunch of different types of video/light art that'd be great for chill zones or ambient interactive stations. Feel free to check out some of my work at kristinlnelson.com or on Instagram @_kriztin. Thank you!"

message_body: |-
  Hi hi! I had the most magical ethereal time at Osmosis last year, and am reaching out because my friends who volunteered last time (Dana + Jam) convinced me how wonderful it was! I know tix just went on sale and I haven't seen any updates shared re: volunteering, but figured it wouldn't hurt to send a message earlier than later! 

  Anyways, I would love to help out in whatever ways are needed! I am more interested in helping set up beforehand and less so in tear down tasks. I also have interest / knowledge re: art/installations/projection mapping etc etc and would love to be involved with anything particularly creative :-) But again, I'm very flexible, mostly just wanna see if there's ways to get involved! Or if there's a more formal volunteer form I should be looking out for in the future ~ thank you! <3 Julia
message_body: 'Hey hey, I’m reaching out to express interest in volunteering this year. I’m happy to help wherever is necessary. Most of my skills are best expressed in ‘customer facing’ roles like bar, merch, or even massage for staff (I am graduating the week before the festival!) can’t wait for another great weekend. The last one was one of the best gatherings I’ve ever been to! Xoxo Ivy'
